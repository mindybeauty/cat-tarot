<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓咪塔羅 · 貓靈神諭</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#04020e;--gold:#c9952a;--gold-light:#f0c96a;--gold-dim:#7a5c1a;--gold-glow:rgba(201,149,42,0.35);--purple:#7c3aed;--rose:#e879a0;--green:#4ade80;--white:#f5f0ea;--muted:#c0bbd0;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;}
#starCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.nebula{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 55% 45% at 15% 60%,rgba(124,58,237,.18) 0%,transparent 65%),radial-gradient(ellipse 45% 55% at 85% 30%,rgba(45,212,191,.07) 0%,transparent 55%),radial-gradient(ellipse 70% 40% at 50% 90%,rgba(42,15,107,.35) 0%,transparent 60%);}
.page{position:relative;z-index:1;max-width:1020px;margin:0 auto;padding:48px 20px 80px;display:flex;flex-direction:column;align-items:center;gap:30px;}
/* HEADER */
.header{text-align:center;animation:riseIn 1.2s cubic-bezier(.22,1,.36,1) both;}
@keyframes riseIn{from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:translateY(0);}}
.header-glyph{font-size:1.4rem;letter-spacing:.6em;color:var(--gold);text-shadow:0 0 18px var(--gold-glow);margin-bottom:10px;display:block;}
.header h1{font-family:'Cinzel Decorative',serif;font-size:clamp(2.2rem,5.5vw,3.8rem);color:var(--gold-light);letter-spacing:.12em;text-shadow:0 0 30px rgba(240,201,106,.5),0 0 80px rgba(201,149,42,.2);line-height:1.1;}
.header-sub{margin-top:8px;font-size:.8rem;color:var(--gold-dim);letter-spacing:.35em;font-weight:300;}
.header-tagline{margin-top:6px;font-size:.95rem;color:var(--muted);letter-spacing:.2em;font-weight:300;}
.ornament{display:flex;align-items:center;gap:14px;margin:12px 0 0;color:var(--gold-dim);font-size:.8rem;letter-spacing:.2em;}
.ornament::before,.ornament::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);}
/* SETUP */
.setup-panel{width:100%;max-width:760px;background:rgba(17,6,48,.6);border:1px solid rgba(201,149,42,.2);border-radius:20px;padding:30px 28px;backdrop-filter:blur(12px);display:flex;flex-direction:column;gap:24px;animation:riseIn 1s ease .3s both;}
.section-label{display:block;text-align:center;font-size:.72rem;color:var(--gold);letter-spacing:.4em;margin-bottom:12px;font-weight:400;}
/* QUESTION */
.question-wrap{position:relative;}
.question-wrap::before,.question-wrap::after{content:'🐾';position:absolute;top:50%;transform:translateY(-50%);font-size:.9rem;opacity:.28;pointer-events:none;}
.question-wrap::before{left:14px;}.question-wrap::after{right:14px;}
.question-input{width:100%;padding:14px 44px;background:rgba(10,4,30,.7);border:1px solid rgba(201,149,42,.25);border-radius:10px;color:var(--white);font-family:'Noto Serif TC',serif;font-size:.9rem;letter-spacing:.08em;text-align:center;resize:none;transition:border-color .3s,box-shadow .3s;outline:none;line-height:1.65;}
.question-input::placeholder{color:rgba(122,109,128,.5);letter-spacing:.1em;}
.question-input:focus{border-color:rgba(201,149,42,.55);box-shadow:0 0 20px rgba(201,149,42,.1);}
/* CATEGORY TABS */
.category-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.cat-tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;background:rgba(10,4,30,.6);border:1px solid rgba(201,149,42,.18);border-radius:10px;cursor:pointer;transition:all .25s ease;min-width:88px;}
.cat-tab:hover{border-color:rgba(201,149,42,.4);background:rgba(42,15,107,.3);transform:translateY(-2px);}
.cat-tab.active{border-color:var(--gold);background:rgba(42,15,107,.55);box-shadow:0 0 16px rgba(201,149,42,.18);}
.cat-icon{font-size:1.2rem;line-height:1;}.cat-name{font-size:.72rem;color:var(--gold-light);letter-spacing:.08em;font-weight:600;white-space:nowrap;}
/* SPREAD GRID */
.spread-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-height:80px;}
.spread-card{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 14px;background:rgba(10,4,30,.6);border:1px solid rgba(201,149,42,.18);border-radius:10px;cursor:pointer;transition:all .25s ease;min-width:120px;max-width:160px;text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;animation-delay:var(--si);}
@keyframes popIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.spread-card:hover{border-color:rgba(201,149,42,.4);background:rgba(42,15,107,.3);transform:translateY(-2px);}
.spread-card.active{border-color:var(--gold);background:rgba(42,15,107,.55);box-shadow:0 0 16px rgba(201,149,42,.2);}
.sc-name{font-size:.8rem;color:var(--gold-light);letter-spacing:.06em;font-weight:600;}
.sc-count{font-size:.62rem;color:var(--gold-dim);letter-spacing:.1em;}
.sc-desc{font-size:.62rem;color:var(--muted);line-height:1.4;margin-top:2px;}
/* CHOICE OPTIONS */
.choice-options-section{display:flex;flex-direction:column;gap:10px;padding:16px;background:rgba(10,4,30,.5);border:1px solid rgba(201,149,42,.15);border-radius:12px;}
.co-row{display:flex;align-items:center;gap:10px;}
.co-label{font-size:.72rem;color:var(--gold);letter-spacing:.1em;min-width:42px;flex-shrink:0;}
.co-input{flex:1;padding:10px 14px;background:rgba(17,6,48,.7);border:1px solid rgba(201,149,42,.22);border-radius:8px;color:var(--white);font-family:'Noto Serif TC',serif;font-size:.85rem;outline:none;transition:border-color .3s;}
.co-input::placeholder{color:rgba(122,109,128,.45);}
.co-input:focus{border-color:rgba(201,149,42,.5);}
.co-btns{display:flex;gap:8px;justify-content:center;}
.co-add-btn,.co-rm-btn{padding:7px 18px;font-family:'Noto Serif TC',serif;font-size:.75rem;letter-spacing:.15em;cursor:pointer;border-radius:6px;transition:all .25s ease;}
.co-add-btn{background:transparent;border:1px solid rgba(201,149,42,.35);color:var(--gold-light);}
.co-add-btn:hover{background:rgba(201,149,42,.1);border-color:var(--gold);}
.co-rm-btn{background:transparent;border:1px solid rgba(232,121,160,.3);color:var(--rose);}
.co-rm-btn:hover{background:rgba(232,121,160,.1);}
.co-rm-btn:disabled{opacity:.3;cursor:default;}
.co-add-btn:disabled{opacity:.3;cursor:default;}
/* BEGIN BTN */
.begin-btn{align-self:center;padding:14px 52px;background:linear-gradient(135deg,rgba(42,15,107,.85),rgba(17,6,48,.95));border:1px solid var(--gold);color:var(--gold-light);font-family:'Noto Serif TC',serif;font-size:.92rem;letter-spacing:.3em;cursor:pointer;border-radius:6px;position:relative;overflow:hidden;transition:all .3s ease;}
.begin-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,149,42,.12),rgba(124,58,237,.2));opacity:0;transition:opacity .3s;}
.begin-btn:hover::before{opacity:1;}
.begin-btn:hover{box-shadow:0 0 24px var(--gold-glow),0 0 50px rgba(124,58,237,.2);transform:translateY(-2px);}
/* READING AREA */
.reading-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:26px;}
.reading-area.hidden{display:none;}
.reading-header{text-align:center;display:flex;flex-direction:column;gap:8px;align-items:center;}
.reading-spread-name{font-size:.75rem;color:var(--gold);letter-spacing:.4em;}
.reading-question{font-size:.9rem;color:var(--gold-light);font-style:italic;letter-spacing:.08em;padding:10px 22px;background:rgba(42,15,107,.25);border:1px solid rgba(201,149,42,.15);border-radius:8px;line-height:1.65;max-width:560px;}
.instruction{font-size:.78rem;color:var(--muted);letter-spacing:.2em;text-align:center;animation:breathe 3s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.5;}50%{opacity:1;}}
.section-divider{width:100%;max-width:500px;display:flex;align-items:center;gap:16px;color:var(--gold-dim);font-size:.75rem;letter-spacing:.2em;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);}
/* SPREAD */
.spread{display:flex;justify-content:center;align-items:flex-end;gap:clamp(10px,2.2vw,20px);width:100%;padding:10px 0 16px;flex-wrap:wrap;}
/* SLOT */
.slot{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:dealIn .7s cubic-bezier(.34,1.56,.64,1) forwards;animation-delay:var(--d);}
@keyframes dealIn{from{opacity:0;transform:translateY(-55px) scale(.85) rotate(var(--tilt));}to{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}}
.pos-badge{display:flex;flex-direction:column;align-items:center;gap:3px;}
.pos-num{width:22px;height:22px;border:1px solid var(--gold-dim);border-radius:50%;display:grid;place-items:center;font-size:.65rem;color:var(--gold);}
.pos-name{font-size:.7rem;color:var(--gold-dim);letter-spacing:.1em;text-align:center;max-width:100px;}
.pos-opt{font-size:.62rem;color:var(--muted);text-align:center;max-width:100px;line-height:1.3;margin-top:1px;}
/* CARD */
.card-wrap{width:var(--card-w,140px);aspect-ratio:2/3.6;perspective:1000px;cursor:pointer;transition:transform .3s ease;}
.card-wrap:hover{transform:translateY(-6px);}
.card-wrap:hover .card-inner:not(.flipped) .card-back-face{box-shadow:0 0 0 1px rgba(201,149,42,.5),0 0 30px rgba(124,58,237,.4),0 0 60px rgba(201,149,42,.15),0 20px 40px rgba(0,0,0,.7);}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .85s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;overflow:hidden;}
.card-back-face{background:linear-gradient(155deg,#1b0c42 0%,#0b0620 50%,#180a3a 100%);border:1px solid rgba(201,149,42,.28);box-shadow:0 0 0 1px rgba(201,149,42,.08),inset 0 0 40px rgba(124,58,237,.25),0 12px 30px rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;}
.back-inner{width:88%;height:92%;border:1px solid rgba(201,149,42,.18);border-radius:8px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.back-inner::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(201,149,42,.12) 1.5px,transparent 1.5px);background-size:18px 18px;}
.back-paw-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px;opacity:.25;font-size:clamp(9px,1.8vw,14px);text-align:center;line-height:1.6;}
.back-sigil{position:absolute;font-size:2.8rem;opacity:.08;filter:blur(2px);}
.back-corner{position:absolute;color:rgba(201,149,42,.4);font-size:.55rem;font-family:'IM Fell English SC',serif;}
.back-corner.tl{top:6px;left:8px;}.back-corner.br{bottom:6px;right:8px;}
.card-front-face{transform:rotateY(180deg);background:linear-gradient(160deg,#130830 0%,#0a0418 55%,#130828 100%);border:1px solid rgba(201,149,42,.4);box-shadow:0 0 0 1px rgba(201,149,42,.12),inset 0 0 50px rgba(124,58,237,.15),0 15px 45px rgba(0,0,0,.75);display:flex;align-items:stretch;}
.card-inner.flipped .card-front-face{animation:frontGlow 3.5s ease-in-out .9s infinite;}
@keyframes frontGlow{0%,100%{box-shadow:0 0 0 1px rgba(201,149,42,.12),inset 0 0 50px rgba(124,58,237,.15),0 15px 45px rgba(0,0,0,.75);}50%{box-shadow:0 0 0 1px rgba(201,149,42,.35),inset 0 0 60px rgba(124,58,237,.25),0 0 40px rgba(201,149,42,.2),0 20px 50px rgba(0,0,0,.65);}}
.front-frame{flex:1;margin:8px;border:1px solid rgba(201,149,42,.2);border-radius:7px;display:flex;flex-direction:column;align-items:center;padding:7px 5px;gap:5px;position:relative;}
.front-frame::before{content:'✦';position:absolute;top:5px;left:6px;color:rgba(201,149,42,.35);font-size:7px;}
.front-frame::after{content:'✦';position:absolute;bottom:5px;right:6px;color:rgba(201,149,42,.35);font-size:7px;}
.card-num{font-family:'IM Fell English SC',serif;font-size:.55rem;color:var(--gold-dim);letter-spacing:.1em;}
.card-art-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.card-emoji-main{font-size:clamp(2rem,5vw,3.2rem);line-height:1;filter:drop-shadow(0 0 8px rgba(201,149,42,.4));}
.card-emoji-sub{font-size:clamp(.9rem,2vw,1.2rem);line-height:1;opacity:.75;}
.card-inner.flipped .card-emoji-main{animation:floatEmoji 4s ease-in-out 1s infinite;}
@keyframes floatEmoji{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.reversed .card-art-box{transform:rotate(180deg);}
.card-divider-line{width:55%;height:1px;flex-shrink:0;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);}
.card-name-text{font-size:clamp(.52rem,1.1vw,.68rem);font-weight:700;color:var(--gold-light);text-align:center;letter-spacing:.04em;line-height:1.35;}
.reversed-badge{font-size:.45rem;color:var(--rose);letter-spacing:.15em;opacity:0;}
.reversed-badge.visible{opacity:1;}
.card-meaning-text{font-size:clamp(.42rem,.9vw,.56rem);color:var(--muted);text-align:center;line-height:1.5;padding:0 3px;}
/* READING PANEL */
.reading-panel{width:100%;max-width:860px;background:rgba(17,6,48,.6);border:1px solid rgba(201,149,42,.18);border-radius:16px;padding:22px 26px;backdrop-filter:blur(12px);}
.reading-title{text-align:center;font-size:.72rem;color:var(--gold);letter-spacing:.4em;margin-bottom:16px;font-weight:400;}
.reading-empty{text-align:center;color:var(--muted);font-size:.82rem;letter-spacing:.12em;padding:10px 0;opacity:.7;}
.reading-list{display:flex;flex-direction:column;gap:10px;}
.reading-item{display:grid;grid-template-columns:82px 1fr;gap:12px;align-items:start;background:rgba(124,58,237,.08);border:1px solid rgba(201,149,42,.1);border-radius:10px;padding:10px 14px;animation:fadeSlide .4s ease both;animation-delay:var(--rd);}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.ri-pos{display:flex;flex-direction:column;gap:3px;}
.ri-pos-name{font-size:.65rem;color:var(--gold);letter-spacing:.2em;}
.ri-card-name{font-size:.75rem;color:var(--gold-light);font-weight:600;}
.ri-badge{font-size:.55rem;color:var(--rose);letter-spacing:.1em;}
.ri-meaning{font-size:.78rem;color:var(--muted);line-height:1.7;padding-top:1px;}
/* YES/NO */
.yesno-result{display:flex;flex-direction:column;align-items:center;gap:14px;padding:10px 0;}
.yesno-answer{font-family:'Cinzel Decorative',serif;font-size:3rem;letter-spacing:.15em;text-shadow:0 0 30px currentColor;}
.yesno-answer.yes{color:var(--green);}.yesno-answer.no{color:var(--rose);}
.yesno-card-name{font-size:.85rem;color:var(--gold-light);letter-spacing:.12em;}
.yesno-meaning{font-size:.82rem;color:var(--muted);line-height:1.7;text-align:center;max-width:500px;}
/* CHOICE RESULT */
.choice-result{display:flex;flex-direction:column;gap:12px;}
.choice-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;background:rgba(124,58,237,.08);border:1px solid rgba(201,149,42,.1);border-radius:10px;padding:12px 16px;animation:fadeSlide .4s ease both;animation-delay:var(--rd);}
.choice-item.winner{border-color:var(--gold);background:rgba(42,15,107,.3);box-shadow:0 0 16px rgba(201,149,42,.15);}
.ci-left{display:flex;flex-direction:column;gap:4px;}
.ci-opt{font-size:.65rem;color:var(--gold);letter-spacing:.2em;}
.ci-card{font-size:.8rem;color:var(--gold-light);font-weight:600;}
.ci-meaning{font-size:.75rem;color:var(--muted);line-height:1.6;margin-top:3px;}
.ci-right{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:70px;}
.ci-pct{font-family:'Cinzel Decorative',serif;font-size:1.3rem;font-weight:700;}
.ci-pct.high{color:var(--green);}.ci-pct.mid{color:var(--gold-light);}.ci-pct.low{color:var(--rose);}
.ci-bar-wrap{width:60px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.ci-bar{height:100%;border-radius:3px;transition:width .8s ease;}
.ci-bar.high{background:var(--green);}.ci-bar.mid{background:var(--gold-light);}.ci-bar.low{background:var(--rose);}
.ci-crown{font-size:.8rem;text-align:center;}
.choice-recommend{margin-top:6px;padding:14px 18px;background:rgba(42,15,107,.4);border:1px solid rgba(201,149,42,.3);border-radius:10px;text-align:center;}
.cr-label{font-size:.68rem;color:var(--gold-dim);letter-spacing:.3em;margin-bottom:6px;}
.cr-winner{font-size:1rem;color:var(--gold-light);font-weight:700;letter-spacing:.08em;}
/* CTA */
.cta-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center;}
.ghost-btn{padding:12px 26px;background:transparent;border:1px solid rgba(201,149,42,.3);color:var(--muted);font-family:'Noto Serif TC',serif;font-size:.82rem;letter-spacing:.22em;cursor:pointer;border-radius:4px;transition:all .3s ease;}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold-light);background:rgba(42,15,107,.3);transform:translateY(-2px);}
.reshuffle-btn{padding:13px 36px;background:transparent;border:1px solid var(--gold);color:var(--gold-light);font-family:'Noto Serif TC',serif;font-size:.88rem;letter-spacing:.28em;cursor:pointer;border-radius:4px;position:relative;overflow:hidden;transition:all .3s ease;}
.reshuffle-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,149,42,.1),rgba(124,58,237,.18));opacity:0;transition:opacity .3s;}
.reshuffle-btn:hover::before{opacity:1;}
.reshuffle-btn:hover{box-shadow:0 0 20px var(--gold-glow),0 0 40px rgba(124,58,237,.2);transform:translateY(-2px);}
.footer-note{font-size:.62rem;color:rgba(122,109,128,.4);letter-spacing:.18em;text-align:center;}
.hidden{display:none !important;}
@keyframes shuffleOut{0%{opacity:1;transform:scale(1) rotate(0);}40%{opacity:.5;transform:scale(.8) rotate(8deg) translateY(-20px);}100%{opacity:0;transform:scale(.6) rotate(-5deg) translateY(40px);}}
.slot.shuffle-out{animation:shuffleOut .45s ease both !important;}
/* touch: prevent double-tap zoom on cards */
.card-wrap{touch-action:manipulation;}
.begin-btn,.reshuffle-btn,.ghost-btn,.shot-btn,.sa-btn,.hist-toggle-btn,.co-add-btn,.co-rm-btn{touch-action:manipulation;}

@media(max-width:640px){
  .page{padding:28px 14px 60px;gap:22px;}
  /* header */
  .header-tagline{font-size:.82rem;}
  /* setup */
  .setup-panel{padding:20px 14px;gap:18px;}
  /* category tabs — horizontal scroll, no wrap */
  .category-tabs{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .category-tabs::-webkit-scrollbar{display:none;}
  .cat-tab{min-width:74px;flex-shrink:0;padding:9px 10px;}
  /* spread grid — horizontal scroll */
  .spread-grid{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .spread-grid::-webkit-scrollbar{display:none;}
  .spread-card{min-width:108px;flex-shrink:0;}
  /* card text — bump up minimum readable size */
  .card-name-text{font-size:clamp(.62rem,2.2vw,.75rem);}
  .card-meaning-text{font-size:clamp(.52rem,1.8vw,.6rem);}
  /* spread area */
  .spread{gap:8px;padding:6px 0 12px;}
  /* reading panel */
  .reading-panel{padding:18px 14px;}
  .reading-item{grid-template-columns:1fr;gap:6px;}
  .ri-pos{flex-direction:row;flex-wrap:wrap;align-items:center;gap:6px;}
  /* choice result */
  .choice-item{grid-template-columns:1fr;gap:8px;}
  .ci-right{flex-direction:row;justify-content:flex-start;align-items:center;gap:10px;}
  .ci-bar-wrap{width:120px;}
  /* conclusion */
  .conclusion-panel{padding:20px 14px;}
  .cn-part{gap:8px;}
  /* screenshot modal */
  .shot-modal{padding:12px;}
  .shot-card{max-height:72vh;border-radius:12px;}
  .shot-actions{flex-direction:column;align-items:stretch;gap:8px;width:100%;max-width:500px;}
  .sa-btn{text-align:center;padding:13px 20px;font-size:.82rem;}
  /* history */
  .hist-panel{padding:14px 12px;}
  .he-summary{padding:10px 12px;}
  .he-detail{padding:0 12px 10px;}
  /* cta row */
  .cta-row{gap:10px;}
  .ghost-btn{padding:11px 18px;font-size:.78rem;}
  .reshuffle-btn{padding:11px 24px;}
}
/* SHUFFLE OVERLAY */

// ─── STARFIELD ────────────────────────────────────────────────────
(function(){
  const canvas=document.getElementById('starCanvas'),ctx=canvas.getContext('2d');
  let W,H,stars,parts;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function build(){
    stars=Array.from({length:220},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.25,phase:Math.random()*Math.PI*2,freq:Math.random()*.018+.004}));
    parts=Array.from({length:35},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.4,vy:Math.random()*.55+.15,vx:(Math.random()-.5)*.4,gold:Math.random()>.45}));
  }
  resize();build();window.addEventListener('resize',()=>{resize();build();});
  let f=0;(function tick(){ctx.clearRect(0,0,W,H);f++;
    stars.forEach(s=>{const a=(Math.sin(f*s.freq+s.phase)+1)/2*.75+.1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,201,106,${a})`;ctx.fill();});
    parts.forEach(p=>{p.y-=p.vy;p.x+=p.vx;if(p.y<-5){p.y=H+5;p.x=Math.random()*W;}const a=Math.max(0,((H-p.y)/H)*.55);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.gold?`rgba(212,168,67,${a})`:`rgba(168,85,247,${a})`;ctx.fill();});
    requestAnimationFrame(tick);})();
})();

// ─── UTILS ────────────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function drawN(n){return shuffle(CARDS).slice(0,n).map(c=>({...c,isReversed:Math.random()>.5}));}
function getCat(id){return CATEGORIES.find(c=>c.id===id);}
function getSpread(cId,sId){return getCat(cId)?.spreads.find(s=>s.id===sId);}
function getLuck(card){const l=LUCK[card.num]||[50,25];return card.isReversed?l[1]:l[0];}
function luckClass(pct){return pct>=70?'high':pct>=45?'mid':'low';}

// context-aware meaning
function getMeaning(card,catId){
  const ctx=CTX[card.num];if(!ctx)return card.isReversed?'逆位能量顯現，需謹慎面對當前局面。':'正位能量充沛，方向正確。';
  const c=ctx[catId==='simple'?'choice':catId]||ctx['choice'];
  return card.isReversed?c.dn:c.up;
}

// ─── RENDER SPREAD ────────────────────────────────────────────────
function getPositions(){
  if(selSpreadId==='choice'){
    const opts=choiceOptions.filter(o=>o.trim());
    const effective=opts.length>=2?opts:['選項一','選項二'];
    return effective.map((o,i)=>({name:`選項${i+1}`,desc:o||`選項${i+1}`,optText:o}));
  }
  return getSpread(selCatId,selSpreadId)?.positions||[];
}
function calcCardWidth(n,defaultPx){
  const sw=window.innerWidth;
  if(sw>=640)return defaultPx+'px';
  // mobile: fit cleanly — max 3 per row for n≥3, else n per row
  const perRow=n<=2?n:n===4?2:3;
  const w=Math.floor((sw-40-(perRow-1)*8)/perRow);
  return Math.min(w,defaultPx)+'px';
}
function renderSpread(){
  const positions=getPositions();
  const sp=getSpread(selCatId,selSpreadId);
  drawnCards=drawN(positions.length);flippedSet.clear();
  const el=document.getElementById('spread');
  const n=positions.length;
  let defPx=parseInt(sp?.cardWidth||'140');
  if(selSpreadId==='choice'){defPx=n<=2?170:n===3?150:135;}
  el.style.setProperty('--card-w',calcCardWidth(n,defPx));
  el.innerHTML=drawnCards.map((card,i)=>buildSlot(card,i,positions[i])).join('');
  updateReading();
}
function buildSlot(card,idx,pos){
  const revClass=card.isReversed?'reversed':'';
  const meaning=getMeaning(card,selCatId);
  const tilt=((Math.random()-.5)*5).toFixed(1);
  const optLine=pos.optText?`<div class="pos-opt">${pos.optText}</div>`:'';
  return `<div class="slot" id="slot-${idx}" style="--d:${idx*.13}s;--tilt:${tilt}deg">
    <div class="pos-badge">
      <div class="pos-num">${idx+1}</div>
      <div class="pos-name">${pos.name}</div>
      ${optLine}
    </div>
    <div class="card-wrap" onclick="flipCard(${idx})" title="${pos.desc}">
      <div class="card-inner" id="card-${idx}">
        <div class="card-face card-back-face">
          <div class="back-inner">
            <div class="back-paw-grid">${'🐾'.repeat(12)}</div>
            <div class="back-sigil">🐱</div>
            <span class="back-corner tl">☽</span><span class="back-corner br">☾</span>
          </div>
        </div>
        <div class="card-face card-front-face">
          <div class="front-frame ${revClass}">
            <div class="card-num">${card.num}</div>
            <div class="card-art-box">
              <div class="card-emoji-main">${card.main}</div>
              <div class="card-emoji-sub">${card.sub}</div>
            </div>
            <div class="card-divider-line"></div>
            <div class="card-name-text">${card.name}</div>
            <div class="reversed-badge ${card.isReversed?'visible':''}">逆 位</div>
            <div class="card-divider-line"></div>
            <div class="card-meaning-text">${meaning}</div>
          </div>
        </div>

    </div>
  </div>`;
}

// ─── FLIP ─────────────────────────────────────────────────────────
function flipCard(idx){
  const el=document.getElementById(`card-${idx}`);if(!el)return;
  if(flippedSet.has(idx)){el.classList.remove('flipped');flippedSet.delete(idx);}
  else{el.classList.add('flipped');flippedSet.add(idx);}
  updateReading();
}

// ─── READING PANEL ────────────────────────────────────────────────
function updateReading(){
  const content=document.getElementById('readingContent');
  const positions=getPositions();
  if(flippedSet.size===0){content.innerHTML='<p class="reading-empty">翻開任意牌面以查閱貓靈的訊息</p>';return;}

  // YES/NO
  if(selSpreadId==='yesno'&&flippedSet.has(0)){
    const card=drawnCards[0],isYes=!card.isReversed;
    const meaning=getMeaning(card,'simple');
    content.innerHTML=`<div class="yesno-result">
      <div class="yesno-answer ${isYes?'yes':'no'}">${isYes?'是':'否'}</div>
      <div class="yesno-card-name">${card.main} ${card.num} ${card.name}${card.isReversed?' · 逆位':''}</div>
      <div class="yesno-meaning">${meaning}</div>
      <button class="shot-btn" onclick="openShotModal()" style="margin-top:8px">📸 &nbsp; 生成截圖卡片</button>
    </div>`;
    _shotAdviceOverride=meaning;
    saveReadingHistory(meaning,isYes?'貓靈說：是 ✅':'貓靈說：否 ❌',isYes?'vibe-high':'vibe-low',getLuck(card));
    buildConclusion();return;
  }

  // CHOICE ANALYSIS
  if(selSpreadId==='choice'){
    const flipped=[...flippedSet].sort((a,b)=>a-b);
    const allFlipped=flippedSet.size===drawnCards.length;
    let winnerIdx=-1,winnerPct=0;
    if(allFlipped){flipped.forEach(i=>{const p=getLuck(drawnCards[i]);if(p>winnerPct){winnerPct=p;winnerIdx=i;}});}
    const items=flipped.map((idx,i)=>{
      const card=drawnCards[idx],pos=positions[idx];
      const pct=getLuck(card),cls=luckClass(pct);
      const isWinner=allFlipped&&idx===winnerIdx;
      const meaning=getMeaning(card,'simple');
      return `<div class="choice-item ${isWinner?'winner':''}" style="--rd:${i*.08}s">
        <div class="ci-left">
          <div class="ci-opt">${pos.name}${pos.optText?' · '+pos.optText:''}</div>
          <div class="ci-card">${card.main} ${card.name}${card.isReversed?' (逆位)':''}</div>
          <div class="ci-meaning">${meaning}</div>
        </div>
        <div class="ci-right">
          <div class="ci-pct ${cls}">${pct}%</div>
          <div class="ci-bar-wrap"><div class="ci-bar ${cls}" style="width:${pct}%"></div></div>
          ${isWinner?'<div class="ci-crown">👑 推薦</div>':''}
        </div>
      </div>`;
    }).join('');
    const winnerLabel=positions[winnerIdx]?.optText||positions[winnerIdx]?.name||'';
    const recommend=allFlipped?`<div class="choice-recommend">
      <div class="cr-label">✦ &nbsp; 貓靈推薦 &nbsp; ✦</div>
      <div class="cr-winner">${winnerLabel} &nbsp;｜&nbsp; 好運 ${winnerPct}%</div>
    </div>
    <button class="shot-btn" onclick="openShotModal()" style="margin:6px auto 0;display:block">📸 &nbsp; 生成截圖卡片</button>`:'';
    if(allFlipped){
      const advOverride=`貓靈推薦：${winnerLabel}（好運 ${winnerPct}%）`;
      _shotAdviceOverride=advOverride;
      saveReadingHistory(advOverride,`👑 ${winnerLabel} ${winnerPct}%`,winnerPct>=62?'vibe-high':'vibe-mid',winnerPct);
    }
    content.innerHTML=`<div class="choice-result">${items}${recommend}</div>`;buildConclusion();return;
  }

  // GENERAL
  const items=[...flippedSet].sort((a,b)=>a-b).map((idx,i)=>{
    const card=drawnCards[idx],pos=positions[idx];
    const meaning=getMeaning(card,selCatId);
    return `<div class="reading-item" style="--rd:${i*.08}s">
      <div class="ri-pos">
        <div class="ri-pos-name">${pos.name}</div>
        <div class="ri-card-name">${card.main} ${card.name}</div>
        ${card.isReversed?'<div class="ri-badge">逆 位</div>':''}
      </div>
      <div class="ri-meaning">${meaning}</div>
    </div>`;
  }).join('');
  content.innerHTML=`<div class="reading-list">${items}</div>`;
  buildConclusion();
}

function buildConclusion(){
  const cp=document.getElementById('conclusionPanel');
  // Not applicable for single-card or choice spreads
  if(selSpreadId==='yesno'||selSpreadId==='choice'){cp.innerHTML='';cp.classList.add('hidden');return;}
  // Only show when all cards flipped
  if(flippedSet.size!==drawnCards.length){cp.innerHTML='';cp.classList.add('hidden');return;}

  const positions=getPositions();
  const question=document.getElementById('questionInput').value.trim();
  const scores=drawnCards.map(c=>getLuck(c));
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const reversedCount=drawnCards.filter(c=>c.isReversed).length;

  // Vibe
  let vibeText,vibeClass;
  if(avg>=75){vibeText='光明強旺 ✨';vibeClass='vibe-high';}
  else if(avg>=62){vibeText='穩中向好 🌟';vibeClass='vibe-good';}
  else if(avg>=48){vibeText='平衡待調 ⚖️';vibeClass='vibe-mid';}
  else{vibeText='能量低潮 🌙';vibeClass='vibe-low';}

  const tier=avg>=62?'high':avg>=48?'mid':'low';
  const catKey=selCatId==='simple'?'simple':selCatId;
  const isSoul=catKey==='soul';
  const advicePool=isSoul?SOUL_ADVICE_POOL[tier]:[ADVICE.soul?ADVICE[catKey]?.[tier]:null].filter(Boolean);
  const adviceText=isSoul
    ? SOUL_ADVICE_POOL[tier][Math.floor(Math.random()*SOUL_ADVICE_POOL[tier].length)]
    : (ADVICE[catKey]||ADVICE.simple)[tier];
  const tips=ACTION_TIPS[catKey]||ACTION_TIPS.simple;
  const tip=tips[Math.floor(Math.random()*tips.length)];
  _currentSoulExtra=isSoul?SOUL_EXTRAS[Math.floor(Math.random()*SOUL_EXTRAS.length)]:null;

  // Narrative rows
  const narrativeRows=drawnCards.map((card,i)=>{
    const pos=positions[i];
    const meaning=getMeaning(card,selCatId);
    const snippet=meaning.split('，')[0].substring(0,28);
    return `<div class="cn-part" style="--np:${i*.07+.1}s">
      <div class="cn-pos-tag">【${pos.name}】</div>
      <div class="cn-card-snippet"><span class="cn-card-name">${card.main} ${card.name}${card.isReversed?' · 逆位':''}</span> — ${snippet}${meaning.length>28?'…':''}</div>
    </div>`;
  }).join('');

  const qLine=question?`<div class="cn-question">針對你的問題：<span>「${question}」</span></div>`:'';
  const revNote=reversedCount>=Math.ceil(drawnCards.length/2)?
    `<div class="cn-reversed-note">⚠️ 此次逆位牌較多（${reversedCount}/${drawnCards.length}張），代表能量受阻或需要向內調整，建議放慢腳步，優先做好內在梳理再往前走。</div>`:'';

  cp.innerHTML=`<div class="conclusion-panel">
    <div class="conclusion-header">
      <span class="ch-deco">✦ &nbsp; 貓靈綜合結論 &nbsp; ✦</span>
      <div class="ch-title">問題解析</div>
    </div>
    ${qLine}
    <div class="cn-energy-row">
      <span class="cn-vibe ${vibeClass}">${vibeText}</span>
      <span class="cn-score">整體能量 ${avg}%</span>
    </div>
    <div class="cn-divider"></div>
    <div class="cn-narrative">${narrativeRows}</div>
    ${revNote}
    <div class="cn-advice">
      <div class="cna-label">🐾 &nbsp; 貓靈建議</div>
      <div class="cna-text">${adviceText}</div>
      <div class="cna-action">✦ 今日行動提示：${tip}。</div>
    </div>
    ${_currentSoulExtra?`<div class="soul-extra"><div class="se-type">${_currentSoulExtra.type}</div><div class="se-text">${_currentSoulExtra.text}</div></div>`:''}
    <button class="shot-btn" onclick="openShotModal()">📸 &nbsp; 生成截圖卡片</button>
  </div>`;
  cp.classList.remove('hidden');
  saveReadingHistory(adviceText,vibeText,vibeClass,avg);
}

const HIST_KEY='catTarotHistory';
function saveReadingHistory(adviceText,vibeText,vibeClass,avg){
  if(_historySaved)return;
  _historySaved=true;
  const positions=getPositions();
  const question=document.getElementById('questionInput').value.trim();
  const sp=getSpread(selCatId,selSpreadId);
  const catNames={study:'學業牌陣',love:'愛情牌陣',work:'工作牌陣',fortune:'運勢牌陣',soul:'心靈淨化',simple:'簡答牌陣'};
  saveHistory({
    date:new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(',',''),
    catName:catNames[selCatId]||selCatId,
    spreadName:sp?.name||selSpreadId,
    question,energy:avg,vibe:vibeText,vibeClass,
    cards:drawnCards.map((c,i)=>({num:c.num,name:c.name,main:c.main,isReversed:c.isReversed,posName:positions[i]?.name||''})),
    advice:adviceText
  });
}
function saveHistory(entry){
  let arr=JSON.parse(localStorage.getItem(HIST_KEY)||'[]');
  arr.unshift(entry);
  if(arr.length>5)arr=arr.slice(0,5);
  localStorage.setItem(HIST_KEY,JSON.stringify(arr));
}
function loadHistory(){return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}
function toggleHistory(){
  const panel=document.getElementById('histPanel');
  if(panel.classList.contains('hidden')){
    panel.classList.remove('hidden');
    renderHistory();
  }else{panel.classList.add('hidden');}
}
function renderHistory(){
  const panel=document.getElementById('histPanel');
  const arr=loadHistory();
  if(!arr.length){panel.innerHTML='<p class="hist-empty">尚無占卜紀錄</p>';return;}
  panel.innerHTML=arr.map((e,i)=>{
    const cardRows=e.cards.map((c,ci)=>`<div class="hec-row"><span class="hec-pos">【${c.posName||`牌${ci+1}`}】</span>${c.main} ${c.name}${c.isReversed?' · 逆位':''}</div>`).join('');
    return `<div class="hist-entry">
      <div class="he-summary" onclick="toggleHistDetail(${i})">
        <div class="he-left">
          <div class="he-date">${e.date}</div>
          <div class="he-spread">${e.catName} · ${e.spreadName}</div>
          ${e.question?`<div class="he-question">「${e.question}」</div>`:''}
        </div>
        <div class="he-right">
          <div class="he-energy">✨ ${e.energy}%</div>
          <div class="he-arrow" id="hea-${i}">▾</div>
        </div>
      </div>
      <div class="he-detail" id="hed-${i}">
        <div class="he-cards-list">${cardRows}</div>
        <div class="he-advice-text">${e.advice}</div>
      </div>
    </div>`;
  }).join('');
}
function toggleHistDetail(i){
  const d=document.getElementById(`hed-${i}`),a=document.getElementById(`hea-${i}`);
  d.classList.toggle('open');a.classList.toggle('open');
}

let _shotText='';
function openShotModal(){
  const positions=getPositions();
  const question=document.getElementById('questionInput').value.trim();
  const sp=getSpread(selCatId,selSpreadId);
  const catNames={study:'學業牌陣',love:'愛情牌陣',work:'工作牌陣',fortune:'運勢牌陣',soul:'心靈淨化',simple:'簡答牌陣'};
  const scores=drawnCards.map(c=>getLuck(c));
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  let vibeText,vibeClass;
  if(avg>=75){vibeText='光明強旺 ✨';vibeClass='vibe-high';}
  else if(avg>=62){vibeText='穩中向好 🌟';vibeClass='vibe-good';}
  else if(avg>=48){vibeText='平衡待調 ⚖️';vibeClass='vibe-mid';}
  else{vibeText='能量低潮 🌙';vibeClass='vibe-low';}
  const catKey=selCatId==='simple'?'simple':selCatId;
  const tier=avg>=62?'high':avg>=48?'mid':'low';
  const isSoulShot=catKey==='soul';
  const adviceText=_shotAdviceOverride||(isSoulShot
    ? SOUL_ADVICE_POOL[tier][Math.floor(Math.random()*SOUL_ADVICE_POOL[tier].length)]
    : (ADVICE[catKey]||ADVICE.simple)[tier]);
  const now=new Date().toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
  const cardRows=drawnCards.map((card,i)=>{
    const pos=positions[i];
    const meaning=getMeaning(card,selCatId);
    const snippet=meaning.substring(0,40)+(meaning.length>40?'…':'');
    const optLine=pos.optText?`<div class="shc-opt">${pos.optText}</div>`:'';
    return `<div class="sh-card-row">
      <div class="shc-pos">【${pos.name}】</div>
      <div class="shc-detail">
        ${optLine}
        <div class="shc-name">${card.main} ${card.name}${card.isReversed?' · 逆位':''}</div>
        <div class="shc-meaning">${snippet}</div>
      </div>
    </div>`;
  }).join('');
  const qLine=question?`<div class="sh-question"><span>✦ 問題</span>${question}</div>`:'';

  // plain text version for clipboard
  const textLines=[`🐾 貓咪塔羅 占卜結果`,`${now}  ${catNames[selCatId]||''} · ${sp?.name||''}`,``];
  if(question)textLines.push(`問題：${question}`,``);
  drawnCards.forEach((c,i)=>{
    const pos=positions[i];
    const optTxt=pos.optText?` (${pos.optText})`:'';
    textLines.push(`【${pos.name}${optTxt}】${c.main}${c.name}${c.isReversed?' (逆位)':''}  ${getMeaning(c,selCatId).substring(0,35)}…`);
  });
  textLines.push(``,`整體能量 ${avg}%  ${vibeText}`,``,`貓靈建議：${adviceText}`);
  if(_currentSoulExtra)textLines.push(``,`${_currentSoulExtra.type}`,`${_currentSoulExtra.text}`);
  _shotText=textLines.join('\n');

  const extraHtml=_currentSoulExtra?`<div class="sh-extra">
    <div class="sh-extra-type">${_currentSoulExtra.type}</div>
    <div class="sh-extra-text">${_currentSoulExtra.text}</div>
  </div>`:'';

  document.getElementById('shotCard').innerHTML=`
    <div class="sh-header">
      <div class="sh-title">🐾 貓咪塔羅 占卜結果</div>
      <div class="sh-meta">${now} &nbsp;｜&nbsp; ${catNames[selCatId]||''} · ${sp?.name||''}</div>
    </div>
    ${qLine}
    <div class="sh-cards">${cardRows}</div>
    <div class="sh-energy">
      <span class="sh-vibe ${vibeClass}">${vibeText}</span>
      <span class="sh-energy-pct">整體能量 ${avg}%</span>
    </div>
    <div class="sh-advice">
      <span class="sh-advice-label">🐾 貓靈建議</span>
      ${adviceText}
    </div>
    ${extraHtml}
    <div class="sh-footer">🐾 貓咪塔羅 · 貓靈神諭 🐾</div>`;
  // reset share button state
  const sb=document.getElementById('saShareBtn');
  if(sb){sb.innerHTML='📤 &nbsp; 儲存 / 分享圖片';sb.disabled=false;}
  document.getElementById('shotModal').classList.remove('hidden');
}
function closeShotModal(){document.getElementById('shotModal').classList.add('hidden');}
function handleShotModalClick(e){if(e.target===e.currentTarget)closeShotModal();}
function copyShotText(){
  navigator.clipboard.writeText(_shotText).then(()=>{
    const btn=document.querySelector('.sa-copy');
    btn.textContent='✅ 已複製！';
    setTimeout(()=>{btn.innerHTML='📋 &nbsp; 複製文字版';},2000);
  }).catch(()=>{alert('請手動複製：\n\n'+_shotText);});
}
async function saveOrShareImage(){
  const btn=document.getElementById('saShareBtn');
  btn.innerHTML='⏳ &nbsp; 處理中…';btn.disabled=true;
  const card=document.getElementById('shotCard');
  // temporarily lift scroll constraint so full content is captured
  const prevMaxH=card.style.maxHeight,prevOvY=card.style.overflowY;
  card.style.maxHeight='none';card.style.overflowY='visible';
  try{
    await document.fonts.ready;
    const canvas=await html2canvas(card,{scale:2,backgroundColor:'#080318',useCORS:true,allowTaint:true,logging:false});
    card.style.maxHeight=prevMaxH;card.style.overflowY=prevOvY;
    canvas.toBlob(async blob=>{
      const file=new File([blob],'貓咪塔羅占卜.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:'貓咪塔羅占卜結果',text:'🐾 我的貓靈神諭結果'});}
        catch(e){if(e.name!=='AbortError')downloadBlob(blob);}
      }else{downloadBlob(blob);}
      btn.innerHTML='✅ &nbsp; 完成！';
      setTimeout(()=>{btn.innerHTML='📤 &nbsp; 儲存 / 分享圖片';btn.disabled=false;},2500);
    },'image/png');
  }catch(err){
    card.style.maxHeight=prevMaxH;card.style.overflowY=prevOvY;
    console.error(err);
    btn.innerHTML='📤 &nbsp; 儲存 / 分享圖片';btn.disabled=false;
    alert('截圖產生失敗，請直接手動截圖。');
  }
}
function downloadBlob(blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='貓咪塔羅占卜.png';a.click();
  URL.revokeObjectURL(url);
}

// ─── RESHUFFLE ────────────────────────────────────────────────────
function reshuffleCards(){
  if(isShuffling)return;isShuffling=true;
  _currentSoulExtra=null;_historySaved=false;_shotAdviceOverride=null;
  const cp=document.getElementById('conclusionPanel');cp.innerHTML='';cp.classList.add('hidden');
  document.querySelectorAll('.slot').forEach((s,i)=>{s.style.animationDelay=`${i*.06}s`;s.classList.add('shuffle-out');});
  setTimeout(()=>{playShuffleAnim(()=>{renderSpread();isShuffling=false;});},520);
}

// ─── INIT ─────────────────────────────────────────────────────────
buildCatTabs();buildSpreadGrid();
